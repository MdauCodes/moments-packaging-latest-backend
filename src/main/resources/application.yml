server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-http-form-post-size: 2MB

spring:
  application:
    name: moments-packaging-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/moments_packaging_db}
    username: postgres
    password: ${DATABASE_PASSWORD:janet-marketing}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
        types:
          print:
            banner: false
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_USERNAME:mdaucodes@gmail.com}
    password: ${BREVO_SMTP_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        transport:
          protocol: smtp
    default-encoding: UTF-8
    test-connection: false
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML
    cache: false
  cache:
    type: caffeine
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC
  mvc:
    pathmatch:
      use-suffix-pattern: false

