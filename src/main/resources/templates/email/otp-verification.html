<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f0eb; margin: 0; padding: 0; }
    .wrapper { max-width: 560px; margin: 40px auto; background: #fffdf9; border-radius: 8px; overflow: hidden; }
    .header { background: #2d5016; padding: 32px 40px; text-align: center; }
    .header h1 { color: #f5f0eb; margin: 0; font-size: 22px; letter-spacing: 1px; }
    .body { padding: 40px; color: #333; }
    .otp-box { background: #2d5016; color: #fff; font-size: 36px; font-weight: bold;
               letter-spacing: 12px; text-align: center; padding: 24px; border-radius: 6px;
               margin: 24px 0; }
    .footer { background: #f0ebe3; padding: 20px 40px; text-align: center;
              font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header"><h1>Moments Packaging Kenya</h1></div>
    <div class="body">
      <p>Hi <strong th:text="${firstName}">there</strong>,</p>
      <p>Your email verification code is:</p>
      <div class="otp-box" th:text="${otp}">000000</div>
      <p>This code expires in <strong>15 minutes</strong>. Do not share it with anyone.</p>
      <p>If you did not create an account, you can safely ignore this email.</p>
    </div>
    <div class="footer">&copy; 2025 Moments Packaging Kenya &mdash; <span th:text="${companyEmail}">info@momentspackaging.com</span></div>
  </div>
</body>
</html>
